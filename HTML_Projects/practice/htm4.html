<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quotation & quotation-like</title>
</head>
<body>
    <q>
        this is text
    </q>
    <blockquote cite="https://vscode.devneeds.ir/">
        جستجوگر افزونه vscode
    </blockquote>
    <!--=======================-->

    <abbr title="Iran">
        IR
    </abbr>
    
    <address>
        Kerman
    </address>

    <bdo dir="rtl">
        this is text
    </bdo>
</body>
</html>
